<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Log Structure Explorer</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dataTables.bootstrap5.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}">
    <style>
        .tree-node { cursor: pointer; user-select: none; transition: background 0.2s; }
        .tree-node:hover { background-color: #f8f9fa; }
        .node-content { display: flex; align-items: center; padding: 5px 0; }
        .collapse-icon { width: 20px; transition: transform 0.2s; }
        .rotate-90 { transform: rotate(90deg); }
        #previewContent { font-family: 'Courier New', monospace; font-size: 13px; tab-size: 4; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">📂 Log Directory Explorer</span>
        <a href="{{ url_for('log_bp.index') }}" class="btn btn-link text-decoration-none text-info"> <i class="bi bi-arrow-left"></i> Go Advanced Search</a>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-md-3 border-end">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">Explorer</div>
                <div class="card-body p-2" style="height: 85vh; overflow-y: auto;" id="treeRoot"></div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center" id="tableTitleArea">
                    <span id="tableTitle" class="fw-bold text-primary">Monthly Records</span>
                    <button id="btnBatchDown" class="btn btn-success btn-sm" style="display:none;" onclick="handleBatchDownload()">
                        <i class="bi bi-file-zip"></i> BatchDownload (<span id="selCount">0</span>)
                    </button>
                </div>
                <div class="card-body">
                    <table id="snTable" class="table table-striped table-hover w-100">
                        <thead>
                            <tr>
                                <th style="width: 30px;"><input type="checkbox" id="selectAll"></th>
                                <th>SN</th>
                                <th>Status</th>
                                <th>Stage</th>
                                <th>Time</th>
                                <th style="width: 140px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content border-0">
            <div class="modal-header bg-dark text-white py-2">
                <h6 class="modal-title" id="previewTitle">Log Viewer</h6>
                <div class="ms-auto">
                    <!-- <button class="btn btn-sm btn-outline-light me-2" onclick="copyLogContent()">Copy</button> -->
                    <button class="btn btn-sm btn-info" onclick="saveLogFromMemory()">Save to PC</button>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
            </div>
            <div class="modal-body p-0 bg-dark">
                <pre id="previewContent" class="m-0 p-3 text-light bg-dark" style="min-height: 400px; white-space: pre-wrap;"></pre>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/jquery-3.7.0.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/jquery.dataTables.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/dataTables.bootstrap5.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/tree.js') }}"></script>
</body>
</html>
